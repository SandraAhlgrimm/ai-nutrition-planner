spring:
  application.name: langchain4j-nutrition-planner
  profiles.active: ${SPRING_PROFILES_ACTIVE:openai}
  security.user:
    password: 123456
    name: alice

langchain4j.open-ai.chat-model:
  log-requests: true
  log-responses: true

logging:
  level:
    com.nutritionplanner: DEBUG
    dev.langchain4j: DEBUG

management:
  endpoints.web.exposure.include: "*"
  endpoint.env.show-values: ALWAYS
  tracing:
    sampling.probability: 1.0
    enabled: true
  otlp:
    metrics.export.step: 5s
    tracing.endpoint: http://localhost:4318/v1/traces

nutrition-planner:
  max-validation-iterations: 3
  user-profiles:
    - name: alice
      dietary-restrictions:
        - vegetarian
      health-goals:
        - weight-loss
        - improve-energy
      daily-calorie-target: 1800
      allergies:
        - nuts
      disliked-ingredients:
        - cilantro
        - olives
